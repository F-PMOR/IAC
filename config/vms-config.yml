  cores: 2
  memory: 2048
  disk_size: 30
  ip: 192.168.1.111
  gateway: 192.168.1.1
  mac: BC:24:11:44:BF:11
  tags:
  - terraform
  - preprod
  - web
  - erp
  - debian
  ansible_groups:
  - preprod
  - webservers
  - dolibarr
  playbooks:
  - name: post-installation.yml
    vars:
      dolibarr_version: 22.0.3
      dolibarr_domain: dolibarr-preprod.morry.fr
  - name: deploy-dolibarr.yml
    vars:
