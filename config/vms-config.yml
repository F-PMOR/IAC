vms:
- name: dolibarr-prod01
  environment: prod
  node: pve01
  description: Dolibarr Production - Serveur principal
  cores: 2
  memory: 4096
  disk_size: 50
  ip: 192.168.1.101
  gateway: 192.168.1.1
  mac: BC:24:11:44:BF:01
  tags:
  - terraform
  - prod
  - web
  - erp
  - debian
  ansible_groups:
  - prod
  - webservers
  - dolibarr
  playbooks:
  - name: post-installation.yml
    vars:
      dolibarr_version: 22.0.3
      dolibarr_domain: dolibarr-prod.morry.fr
  - name: deploy-dolibarr.yml
    vars:
      backup_file: prod_backup_20251201.sql.gz
      documents_backup_file: prod_documents_20251201.tar.gz
  - name: restore-dolibarr-db.yml
- name: dolibarr-preprod01
