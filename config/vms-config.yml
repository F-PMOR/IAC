- name: dolibarr-dev01
  environment: dev
  node: pve02
  description: Dolibarr Développement
  cores: 2
  memory: 2048
  disk_size: 30
  ip: 192.168.1.121
  gateway: 192.168.1.1
  mac: BC:24:11:44:BF:21
