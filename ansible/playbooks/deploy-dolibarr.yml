---
- name: Deploy Dolibarr ERP/CRM
  hosts: preprod
  become: true
  
  vars:
    # Les tags Dolibarr sont au format: 20.0.2, 21.0.0, etc
    # Voir: https://github.com/Dolibarr/dolibarr/tags
    dolibarr_version: "22.0.2"
    dolibarr_git_repo: "https://github.com/Dolibarr/dolibarr.git"
    dolibarr_domain: "dolibarr-prod.local"
    dolibarr_db_password: "SecurePassword123!"
    
  roles:
    - role: dolibarr

# Supprimer et recréer la base de données proprement
# sudo mysql -e "DROP DATABASE IF EXISTS dolibarr;"
# sudo mysql -e "CREATE DATABASE dolibarr CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
# sudo mysql -e "GRANT ALL PRIVILEGES ON dolibarr.* TO 'dolibarr'@'localhost';"
# sudo mysql -e "FLUSH PRIVILEGES;"
